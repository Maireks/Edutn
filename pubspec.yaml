name: edtn
description: EduTN - منصة تعليمية للطلاب التونسيين
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # State Management
  provider: ^6.1.1

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animations: ^2.0.11
  flutter_animate: ^4.3.0

  # PDF
  flutter_pdfview: ^1.3.2
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  percent_indicator: ^4.2.3

  # Utilities
  device_info_plus: ^9.1.2
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4

  # Icons
  cupertino_icons: ^1.0.2
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
